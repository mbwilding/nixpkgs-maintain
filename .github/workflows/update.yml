name: Update nixpkgs packages

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  check-packages:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
       - uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Clone nixpkgs
        uses: actions/checkout@v7
        with:
          repository: NixOS/nixpkgs
          ref: master
          path: nixpkgs

      - name: Filter to packages that exist in nixpkgs
        id: filter
        run: |
          PACKAGES="$(jq -c . packages.json)"
          MATRIX="[]"
          for row in $(echo "$PACKAGES" | jq -c '.[]'); do
            ATTR=$(echo "$row" | jq -r '.attr')
            VERSION=$(nix eval --raw --impure \
              --expr "(import ./nixpkgs {}).${ATTR}.version" 2>/dev/null || true)
            if [ -n "$VERSION" ]; then
              echo "${ATTR} found at ${VERSION}"
              ENTRY=$(echo "$row" | jq -c --arg v "$VERSION" '. + {currentVersion: $v}')
              MATRIX=$(echo "$MATRIX" | jq -c --argjson e "$ENTRY" '. + [$e]')
            else
              echo "${ATTR} not yet in nixpkgs, skipping."
            fi
          done
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  update:
    runs-on: ubuntu-latest
    needs: check-packages
    if: needs.check-packages.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.check-packages.outputs.matrix) }}

    steps:
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Check latest upstream release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list \
            --repo "${{ matrix.package.owner }}/${{ matrix.package.repo }}" \
            --exclude-pre-releases \
            --exclude-drafts \
            --limit 1 \
            --json tagName \
            -q '.[0].tagName' | sed 's/^v//')
          echo "version=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Skip if already up to date
        if: matrix.package.currentVersion == steps.release.outputs.version
        run: echo "Already at ${{ matrix.package.currentVersion }}, skipping."

      - name: Clone nixpkgs
        if: matrix.package.currentVersion != steps.release.outputs.version
        uses: actions/checkout@v7
        with:
          repository: NixOS/nixpkgs
          ref: master
          path: nixpkgs
          token: ${{ secrets.NIXPKGS_TOKEN }}

      - name: Create update branch
        if: matrix.package.currentVersion != steps.release.outputs.version
        working-directory: nixpkgs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ matrix.package.attr }}-${{ steps.release.outputs.version }}"

      - name: Run nix-update
        if: matrix.package.currentVersion != steps.release.outputs.version
        working-directory: nixpkgs
        run: |
          nix run nixpkgs#nix-update -- \
            --version "${{ steps.release.outputs.version }}" \
            --build \
            --format \
            --commit \
            "${{ matrix.package.attr }}"

      - name: Smoke test binary
        if: matrix.package.currentVersion != steps.release.outputs.version && matrix.package.versionCommand != null
        working-directory: nixpkgs
        run: |
          nix-build --impure --expr "(import ./. {}).${{ matrix.package.attr }}"
          OUTPUT=$(result/bin/${{ matrix.package.versionCommand }} 2>&1) || true
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -F "${{ steps.release.outputs.version }}"

      - name: Smoke test binary exists (GUI)
        if: matrix.package.currentVersion != steps.release.outputs.version && matrix.package.versionCommand == null
        working-directory: nixpkgs
        run: |
          nix-build --impure --expr "(import ./. {}).${{ matrix.package.attr }}"
          MAIN=$(nix eval --raw --impure \
            --expr "(import ./. {}).${{ matrix.package.attr }}.meta.mainProgram")
          test -x result/bin/"$MAIN" && echo "Binary result/bin/$MAIN exists and is executable."

      - name: Push branch
        if: matrix.package.currentVersion != steps.release.outputs.version
        working-directory: nixpkgs
        env:
          GH_TOKEN: ${{ secrets.NIXPKGS_TOKEN }}
        run: |
          git remote add fork "https://x-access-token:${{ secrets.NIXPKGS_TOKEN }}@github.com/mbwilding/nixpkgs.git"
          git push fork HEAD

      - name: Open PR to NixOS/nixpkgs
        if: matrix.package.currentVersion != steps.release.outputs.version
        env:
          GH_TOKEN: ${{ secrets.NIXPKGS_TOKEN }}
        run: |
          gh pr create \
            --repo NixOS/nixpkgs \
            --head "mbwilding:${{ matrix.package.attr }}-${{ steps.release.outputs.version }}" \
            --base master \
            --title "${{ matrix.package.attr }}: ${{ matrix.package.currentVersion }} -> ${{ steps.release.outputs.version }}" \
            --body "$(cat <<'EOF'
          Automated update via [nixpkgs-maintain](https://github.com/mbwilding/nixpkgs-maintain).

          ## Things done

          - Built on platform:
            - [x] x86_64-linux
            - [ ] aarch64-linux
            - [ ] x86_64-darwin
            - [ ] aarch64-darwin
          - Tested, as applicable:
            - [ ] [NixOS tests] in [nixos/tests].
            - [ ] [Package tests] at \`passthru.tests\`.
            - [ ] Tests in [lib/tests] or [pkgs/test] for functions and "core" functionality.
          - [ ] Ran \`nixpkgs-review\` on this PR. See [nixpkgs-review usage].
          - [x] Tested basic functionality of all binary files, usually in \`./result/bin/\`.
          - Nixpkgs Release Notes
            - [ ] Package update: when the change is major or breaking.
          - NixOS Release Notes
            - [ ] Module addition: when adding a new NixOS module.
            - [ ] Module update: when the change is significant.
          - [x] Fits [CONTRIBUTING.md], [pkgs/README.md], [maintainers/README.md] and other READMEs.
          - [x] Follows the [automation/AI policy].

          [NixOS tests]: https://nixos.org/manual/nixos/unstable/index.html#sec-nixos-tests
          [Package tests]: https://github.com/NixOS/nixpkgs/blob/master/pkgs/README.md#package-tests
          [nixpkgs-review usage]: https://github.com/Mic92/nixpkgs-review#usage
          [CONTRIBUTING.md]: https://github.com/NixOS/nixpkgs/blob/master/CONTRIBUTING.md
          [automation/AI policy]: https://github.com/NixOS/nixpkgs/blob/master/CONTRIBUTING.md#automationai-policy
          [lib/tests]: https://github.com/NixOS/nixpkgs/blob/master/lib/tests
          [maintainers/README.md]: https://github.com/NixOS/nixpkgs/blob/master/maintainers/README.md
          [nixos/tests]: https://github.com/NixOS/nixpkgs/blob/master/nixos/tests
          [pkgs/README.md]: https://github.com/NixOS/nixpkgs/blob/master/pkgs/README.md
          [pkgs/test]: https://github.com/NixOS/nixpkgs/blob/master/pkgs/test
          EOF
          )"
